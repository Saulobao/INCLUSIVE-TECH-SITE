kind = "web"
previewPath = "/"
title = "Baby Monitor Panel"
version = "1.0.0"
id = "artifacts/baby-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21836

[services.development]
run = "pnpm --filter @workspace/baby-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/baby-monitor", "run", "build" ]
publicDir = "artifacts/baby-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21836"
BASE_PATH = "/"
